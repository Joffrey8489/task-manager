<div class="fixed inset-0 bg-black/70 flex items-center justify-center z-50 ">
<dialog open class="fixed inset-0 z-50  w-96 mt-30 m-auto o p-6 rounded-2xl shadow-5xl fixed border-gray-300  ">
  <h2 class="text-xl font-semibold mb-4 text-green-800">Add A New Task...</h2>

  <form action="" (ngSubmit)="onSubmit()" class="space-y-4">
    <!-- Title -->
    <p class="flex flex-col">
      <label for="title" class="mb-1 text-gray-700 font-medium">Title</label>
      <input type="text" id="title" name="title"
             class="border border-gray-300 rounded-md p-2 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500"  [(ngModel)]="enteredTitle">
    </p>

    <!-- Task -->
    <p class="flex flex-col">
      <label for="task" class="mb-1 text-gray-700 font-medium">Task</label>
      <textarea type="text" id="task" name="task"
             class="border border-gray-300 rounded-md p-2 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500"  [(ngModel)]="enteredTask"></textarea>
    </p>

    <!-- Date -->
    <p class="flex flex-col">
      <label for="date" class="mb-1 text-gray-700 font-medium">Date</label>
      <input type="datetime-local" id="date" name="date"
             class="border border-gray-300 rounded-md p-2 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500" [(ngModel)]="enteredDate">
    </p>

    <!-- Buttons -->
    <p class="flex justify-end space-x-3 mt-4">
      <button (click)="onCancel()" type="button"
              class="px-4 py-2 border border-gray-400 text-gray-700 rounded-md hover:bg-gray-200 transition-colors">
        Cancel
      </button>
      <button type="submit"
              class="px-4 py-2 bg-blue-600 text-white rounded-md hover:bg-blue-700 transition-colors">
        Add
      </button>
    </p>
  </form>
</dialog>
