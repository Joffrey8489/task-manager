@if(isAddingTask){
  <app-new-task/>
}
<button (click)="onStartAddTask()"
class=" items-center ms-auto px-4 py-2 border border-blue-400  rounded-md
       hover:bg-blue-500 hover:text-white transition-colors duration-300">

<i class="fa fa-plus mr-2"></i>
Add Task
</button>
<div class="  px-4 items-center justify-center flex mt-8 mx-auto ">

  <div class="w-full max-w-6xl bg-gray-200 rounded-2xl shadow-2xl relative overflow-hidden">
    <div class="absolute left-0 top-0 h-full w-6 bg-red-400"></div>

    <div class="p-10 pl-12 space-y-6">

      <h2 class="text-4xl font-bold text-green-700">
        My Tasks
      </h2>
      <div class="flex items-center justify-between bg-white/80 backdrop-blur-sm
      p-4 rounded-xl shadow-md hover:shadow-lg
      transition duration-300 border-l-4 border-green-600">


<div>
<h3 class="text-2xl font-semibold text-green-700">
Task Title
</h3>
<p class=" text-lg">
What to do in the task
</p>
</div>
<div class="flex items-center space-x-3">

<div class="flex items-center">
    <input type="checkbox" id="completeToggle" class="hidden peer">
    <label for="completeToggle" class="flex items-center px-3 py-1 border border-green-600 text-green-600 rounded-md cursor-pointer transition-colors
        peer-checked:bg-green-600 peer-checked:text-white">
        <i class="fa fa-check mr-1"></i> Complete
    </label>
</div>

<div class="flex items-center">
    <input type="checkbox" id="deleteToggle" class="hidden peer">
    <label for="deleteToggle" class="flex items-center px-3 py-1 border border-red-600 text-red-600 rounded-md cursor-pointer transition-colors
        peer-checked:bg-red-600 peer-checked:text-white">
        <i class="fa fa-trash mr-1"></i> Delete
    </label>
</div>
</div>
</div>
    </div>

  </div>

</div>
