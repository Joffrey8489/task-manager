@if(isAddingTask){
  <app-new-task (close)="onCloseAddTask()" />
}
<button (click)="onStartAddTask()"
class=" items-center ms-auto px-4 py-2 border border-blue-400  rounded-md
       hover:bg-blue-500 hover:text-white transition-colors duration-300">

<i class="fa fa-plus mr-2"></i>
Add Task
</button>
<section id="tasks" >
<ul>
  @for (task of tasks; track task.id) {
<div class="  px-4 items-center justify-center flex mt-8 mx-auto ">

  <div class="w-full max-w-6xl bg-gray-200 rounded-2xl shadow-2xl relative overflow-hidden">
    <div class="absolute left-0 top-0 h-full w-6 bg-red-400"></div>

    <div class="p-10 pl-12 space-y-6">

      <h2 class="text-4xl font-bold text-green-700">
      My Tasks
      </h2>
      <div class="flex items-center justify-between bg-white/80 backdrop-blur-sm
      p-4 rounded-xl shadow-md hover:shadow-lg
      transition duration-300 border-l-4 border-green-600">


<div>
<h3 class="text-2xl font-semibold text-green-700">
  Title:{{task.title}}
</h3>
<p class=" text-lg">
-->{{task.task}}
</p>
</div>


</div>
<div class="flex flex-col  sm:flex-row sm:items-center gap-3 w-full md:w-auto mt-4 md:mt-0">

  <button (click)="onDeleteTask(task.id)"
  class="flex justify-center items-center px-3 py-1 border border-red-600 text-red-600 rounded-md hover:bg-red-600 hover:text-white transition w-full sm:w-auto">
    <i class="fa fa-trash mr-1"></i>
    Delete
  </button>

</div>
    </div>
    <div class="w-full mx-auto px-5 text-center  md:w-auto md:text-right  font-medium mt-2 md:mt-0">
      {{task.date}}
    </div>
  </div>

</div>

}
</ul>
</section>
